<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL HEALTH MONITOR</title>
    <script src="scripts.js" defer></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="info">
          <h1>URL HEALTH MONITOR</h1>

          <h4>WebSocket: <span id="websocket_status">Connecting...</span></h4>
          <h4>Page will fetch latest update every 60 second</h4>

          <h4 id="status"></h4>
        </div>

        <div class="card">
          <h3>Add URL</h3>

          <input type="text" id="urlInput" placeholder="https://example.com" />

          <button id="addBtn">Add URL</button>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>URL</th>
            <th>Status</th>
            <th>Status Code</th>
            <th>Response Time</th>
            <th>Error</th>
          </tr>
        </thead>

        <tbody id="content-display"></tbody>
      </table>
    </div>
  </body>
</html>
